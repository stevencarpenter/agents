name: Bug report
description: Report incorrect behavior in the registry, emitters, agents, or skills.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest reproducible example and exact command.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, uv version, and relevant tool target.
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste sanitized logs or validation output. Do not include secrets.
      render: text
