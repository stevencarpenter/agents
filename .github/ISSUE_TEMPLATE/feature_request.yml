name: Feature request
description: Propose a reusable agent, skill, emitter, or registry improvement.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What general-purpose problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the desired behavior and its intended users.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What existing agent, skill, or workflow did you consider?
