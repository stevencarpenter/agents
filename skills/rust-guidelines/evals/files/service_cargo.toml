[package]
name = "webhookd"
version = "0.4.2"
edition = "2021"

# TODO: pin these down before release
[dependencies]
tokio = { version = "*", features = ["full"] }
reqwest = { version = "0.11", default-features = true, features = ["blocking", "json", "rustls-tls", "native-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "*"
thiserror = "1"
regex = "1"
clap = { version = "3", features = ["derive", "cargo", "env", "unicode", "wrap_help"] }
uuid = { version = "0.8", features = ["v4", "serde"] }
rand = "0.7"
lazy_static = "1"
log = "0.4"
env_logger = "0.9"
config = { version = "0.13", default-features = true }
chrono = { version = "0.4", features = ["clock", "std", "oldtime"] }
# used to be needed for the metrics endpoint
prometheus = "0.13"

[dependencies.sled]
version = "0.34"
optional = true

[features]
default = ["embedded-db"]
embedded-db = ["sled"]

[profile.release]
debug = true
opt-level = 1
incremental = true
